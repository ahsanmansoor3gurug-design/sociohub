name: sociohub
description: "SocioHub - Connect Your Community"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.5
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Ads
  google_mobile_ads: ^5.1.0

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Utilities
  url_launcher: ^6.2.0
  intl: ^0.19.0
  uuid: ^4.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
